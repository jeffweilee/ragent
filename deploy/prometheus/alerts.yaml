groups:
  - name: ragent.reconciler
    rules:
      - alert: ReconcilerTickStalled
        expr: increase(reconciler_tick_total[10m]) == 0
        for: 1m
        labels:
          severity: critical
          component: reconciler
        annotations:
          summary: "Reconciler tick has not advanced in 10 minutes"
          description: |
            reconciler_tick_total has been flat for >10 min — the K8s CronJob
            scheduling the reconciler may be misconfigured or the job is failing.
            Stale PENDING/UPLOADED/DELETING rows will accumulate (S30, R8).
