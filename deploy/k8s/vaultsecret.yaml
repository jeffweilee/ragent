# ricoberger/vault-secrets-operator — keeps a native K8s Secret named
# `ragent-secrets` in sync with a Vault KV-v2 path. Deployments consume it
# via `envFrom: secretRef`.
#
# Prereq (one-time, cluster-wide):
#   - Operator installed (helm chart `ricoberger/vault-secrets-operator`),
#     pointed at your Vault address and authenticated via the kubernetes
#     auth method using a role that maps the `ragent` ServiceAccount in
#     the `ragent` namespace to a policy granting read on `kv/ragent/*`.
#
# Vault KV-v2 layout expected at `kv/ragent/prod` — each key name matches
# the env-var name verbatim so it passes straight into the Pod's env.
#
# Rollout on rotation: this operator does NOT trigger pod restarts on its
# own. Either install stakater/reloader and add the annotation
#   reloader.stakater.com/auto: "true"
# to the Deployments, or run `kubectl rollout restart deploy/ragent-api
# deploy/ragent-worker` after a Vault update.
---
apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: ragent-secrets
  namespace: ragent
spec:
  # KV-v2 paths MUST include the `/data/` segment.
  path: kv/data/ragent/prod
  type: Opaque
  vaultRole: ragent
  reconcileStrategy: Replace
  keys:
    - MARIADB_DSN
    - ES_USERNAME
    - ES_PASSWORD
    - ES_API_KEY
    - MINIO_SITES
    - AI_LLM_API_J1_TOKEN
    - AI_EMBEDDING_API_J1_TOKEN
    - AI_RERANK_API_J1_TOKEN
    - UNPROTECT_APIKEY
    - FEEDBACK_HMAC_SECRET
    - REDIS_BROKER_URL
    - REDIS_RATELIMIT_URL
