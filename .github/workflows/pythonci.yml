on:
  push:
    branches:
      - develop
      - dev
      - main
      - release
      - master
  pull_request:
    branches:
      - '**'

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run Lint (Ruff)
        run: uv run ruff check src/ tests/ --fix

      - name: Run Format (Ruff)
        run: uv run ruff format src/ tests/

      - name: Run Tests with Coverage (Pytest)
        # Skip e2e (needs real external APIs — LLM, embedding, rerank endpoints).
        # Docker-marked tests run here: ubuntu-latest has Docker and testcontainers
        # spin up MariaDB, ES, MinIO, and Redis for the integration suite.
        run: uv run pytest --cov=src --cov-report=term-missing

      - name: Run Security Check (Bandit)
        run: uv run bandit -r src/ --severity-level high --confidence-level high

      - name: Check dependency vulnerabilities (Safety)
        run: |
          uv export --no-hashes | uv run safety check --stdin --full-report > safety_report.txt || true
          if grep -iq "Critical" safety_report.txt; then
            cat safety_report.txt
            echo "❌ Critical vulnerabilities found!"
            exit 1
          else
            echo "✅ No Critical vulnerabilities found."
          fi
