# MCP Hub dynamic tool registry. Each entry under `tools` is registered as one
# MCP Tool at startup. See _TYPE_MAP and Location in mcp_hub.py for the
# authoritative list of supported `type` and `location` values.

defaults:
  base_url: https://api.example.com
  timeout: 30.0
  headers:
    Accept: application/json
    User-Agent: ragent-mcp-hub/0.1

tools:
  - name: get_user
    description: Fetch a single user by numeric ID.
    method: GET
    path: /users/{user_id}
    parameters:
      - name: user_id
        type: integer
        location: path
        required: true
        description: Numeric user identifier.
      - name: include_deleted
        type: boolean
        location: query
        required: false
        default: false
        description: Include soft-deleted records.

  - name: search_products
    description: Full-text search over the product catalogue.
    method: GET
    path: /products
    parameters:
      - name: q
        type: string
        location: query
        required: true
        description: Search keywords.
      - name: limit
        type: integer
        location: query
        required: false
        default: 20
      - name: x_tenant_id
        type: string
        location: header
        required: true
        description: Tenant scope for the search.

  - name: create_order
    description: Create a new order for the given user.
    method: POST
    path: /users/{user_id}/orders
    parameters:
      - name: user_id
        type: integer
        location: path
        required: true
      - name: sku
        type: string
        location: body
        required: true
        description: Stock-keeping unit of the product to purchase.
      - name: quantity
        type: integer
        location: body
        required: false
        default: 1
      - name: metadata
        type: object
        location: body
        required: false
        description: Arbitrary key/value annotations attached to the order.

  # Heterogeneous upstream: different domain, its own auth, and propagates the
  # caller's identity from the MCP client through to the upstream API.
  #
  # `static_headers` values support `${ENV_VAR}` substitution resolved at
  # startup (the example below uses a literal so the bundled doctor stays
  # green; replace with `"Bearer ${IDENTITY_API_TOKEN}"` in real configs).
  #
  # `forward_headers` maps incoming-header-name -> outgoing-header-name. The
  # ASGI middleware in server.py publishes each MCP request's headers into a
  # ContextVar; the tool closure reads them and forwards per this mapping.
  - name: get_profile
    description: Fetch the caller's profile from the identity service.
    base_url: https://identity.example.com
    method: GET
    path: /me
    static_headers:
      Authorization: "Bearer example-token"
    forward_headers:
      X-User-Id: X-User-Id
      X-Trace-Id: X-Request-Id
